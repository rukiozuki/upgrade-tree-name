<!DOCTYPE html>
<html>
<head>
<style>
    body {
        margin: 0;
        background: #111;
        font-family: Arial, sans-serif;
        color: white;
    }

    /* Currency UI */
    #pointsBox {
        position: fixed;
        bottom: 20px;
        left: 20px;
        width: 200px;
        padding: 14px;
        background: rgba(40, 40, 40, 0.9);
        border-radius: 14px;
        display: flex;
        flex-direction: column;
        gap: 4px;
    }

    #topRow {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    #icon {
        font-size: 32px;
        color: gold;
        font-weight: bold;
    }

    #points {
        font-size: 28px;
        font-weight: bold;
    }

    #rate {
        font-size: 16px;
        color: #bbb;
    }

    /* Honeycomb Grid */
    #tree {
        position: fixed;
        top: 40px;
        right: 40px;
        width: 600px;
    }

    .hex-row {
        display: flex;
        gap: 10px;
        margin-bottom: -25px; /* hex overlap */
    }

    .hex-row.offset {
        margin-left: 55px;
    }

    .hex {
        width: 100px;
        height: 110px;
        background: #222;
        clip-path: polygon(
            50% 0%, 93% 25%, 93% 75%,
            50% 100%, 7% 75%, 7% 25%
        );
        display: flex;
        justify-content: center;
        align-items: center;
        border: 2px solid #444;
        cursor: pointer;
        transition: 0.2s;
        text-align: center;
        padding: 10px;
        font-size: 14px;
    }

    .hex:hover {
        border-color: gold;
        transform: scale(1.05);
    }

    .locked {
        opacity: 0.35;
        border-color: #333;
        cursor: default;
    }
</style>
</head>
<body>

<!-- Currency UI -->
<div id="pointsBox">
    <div id="topRow">
        <div id="icon">P</div>
        <div id="points">0</div>
    </div>
    <div id="rate">+1 / sec</div>
</div>

<!-- Honeycomb Tree -->
<div id="tree"></div>

<script>
/* ===========================
   BIG NUMBER FORMATTER
=========================== */
function format(n) {
    const suffixes = ["", "K", "M", "B", "T", "Qa", "Qi", "Sx", "Sp", "Oc", "No", "Dc"];
    if (n < 1000) return n;
    let tier = Math.floor(Math.log10(n) / 3);
    let suffix = suffixes[tier];
    let scale = Math.pow(10, tier * 3);
    return (n / scale).toFixed(2) + suffix;
}

/* ===========================
   PLAYER STATS
=========================== */
let points = 0;
let rate = 1;

/* ===========================
   FULL HONEYCOMB TREE DATA
=========================== */
let upgrades = [
    // Row 1
    { id: 1, name: "Points Boost I", cost: 100, unlocked: true, effect: () => rate += 1 },
    { id: 2, name: "Points Boost II", cost: 500, unlocked: false, effect: () => rate += 2 },
    { id: 3, name: "Points Boost III", cost: 2000, unlocked: false, effect: () => rate += 5 },

    // Row 2
    { id: 4, name: "Prestige", cost: 10000, unlocked: false, effect: () => rate += 20 },
    { id: 5, name: "Prestige Boost I", cost: 50000, unlocked: false, effect: () => rate += 50 },
    { id: 6, name: "Prestige Boost II", cost: 200000, unlocked: false, effect: () => rate += 100 },

    // Row 3
    { id: 7, name: "Ascend", cost: 1000000, unlocked: false, effect: () => rate += 300 },
    { id: 8, name: "Ascend Boost I", cost: 5000000, unlocked: false, effect: () => rate += 800 },
    { id: 9, name: "Ascend Boost II", cost: 20000000, unlocked: false, effect: () => rate += 1500 },

    // Row 4
    { id: 10, name: "Divinity", cost: 100000000, unlocked: false, effect: () => rate += 5000 },
    { id: 11, name: "Divine Boost I", cost: 500000000, unlocked: false, effect: () => rate += 12000 },
    { id: 12, name: "Divine Boost II", cost: 2000000000, unlocked: false, effect: () => rate += 25000 }
];

/* ===========================
   HONEYCOMB LAYOUT
=========================== */
let layout = [
    [1, 2, 3],        // Row 1
    [4, 5, 6],        // Row 2 (offset)
    [7, 8, 9],        // Row 3
    [10, 11, 12]      // Row 4 (offset)
];

/* ===========================
   RENDER TREE
=========================== */
function renderTree() {
    const tree = document.getElementById("tree");
    tree.innerHTML = "";

    layout.forEach((row, i) => {
        let rowDiv = document.createElement("div");
        rowDiv.className = "hex-row";
        if (i % 2 === 1) rowDiv.classList.add("offset");

        row.forEach(id => {
            let upg = upgrades.find(u => u.id === id);
            let hex = document.createElement("div");
            hex.className = "hex";
            if (!upg.unlocked) hex.classList.add("locked");

            hex.innerHTML = `${upg.name}<br><small>${format(upg.cost)}</small>`;
            hex.onclick = () => buyUpgrade(upg.id);

            rowDiv.appendChild(hex);
        });

        tree.appendChild(rowDiv);
    });
}

/* ===========================
   BUY UPGRADE
=========================== */
function buyUpgrade(id) {
    let upg = upgrades.find(u => u.id === id);
    if (!upg.unlocked) return;
    if (points < upg.cost) return;

    points -= upg.cost;
    upg.effect();

    // Unlock next upgrade in the row
    let next = upgrades.find(u => u.id === id + 1);
    if (next) next.unlocked = true;

    renderTree();
}

/* ===========================
   POINTS LOOP
=========================== */
setInterval(() => {
    points += rate;
    document.getElementById("points").textContent = format(points);
    document.getElementById("rate").textContent = `+${format(rate)} / sec`;
}, 1000);

/* Start */
renderTree();
</script>

</body>
</html>
