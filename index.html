<!DOCTYPE html>
<html>
<head>
<style>
    body {
        margin: 0;
        background: #111;
        font-family: Arial, sans-serif;
        color: white;
    }

    /* Bottom-left currency UI */
    #pointsBox {
        position: fixed;
        bottom: 20px;
        left: 20px;
        width: 200px;
        padding: 14px;
        background: rgba(40, 40, 40, 0.9);
        border-radius: 14px;
        display: flex;
        flex-direction: column;
        gap: 4px;
    }

    #topRow {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    #icon {
        font-size: 32px;
        color: gold;
        font-weight: bold;
    }

    #points {
        font-size: 28px;
        font-weight: bold;
    }

    #rate {
        font-size: 16px;
        color: #bbb;
    }

    /* Honeycomb upgrade tree */
    #tree {
        position: fixed;
        top: 50px;
        right: 50px;
        display: flex;
        flex-wrap: wrap;
        width: 400px;
        gap: 10px;
    }

    .hex {
        width: 90px;
        height: 100px;
        background: #222;
        clip-path: polygon(
            50% 0%, 93% 25%, 93% 75%,
            50% 100%, 7% 75%, 7% 25%
        );
        display: flex;
        justify-content: center;
        align-items: center;
        border: 2px solid #444;
        cursor: pointer;
        transition: 0.2s;
    }

    .hex:hover {
        border-color: gold;
        transform: scale(1.05);
    }
</style>
</head>
<body>

<div id="pointsBox">
    <div id="topRow">
        <div id="icon">P</div>
        <div id="points">0</div>
    </div>
    <div id="rate">+1 / sec</div>
</div>

<div id="tree">
    <div class="hex" onclick="unlockPrestige()">Prestige</div>
    <div class="hex" onclick="unlockAscend()">Ascend</div>
    <div class="hex" onclick="unlockDivinity()">Divinity</div>
</div>

<script>
    let points = 0;
    let rate = 1;

    /* Big number formatter */
    function format(n) {
        const suffixes = ["", "K", "M", "B", "T", "Qa", "Qi", "Sx", "Sp", "Oc", "No", "Dc"];
        let tier = Math.floor(Math.log10(n) / 3);
        if (tier < 1) return n;
        let suffix = suffixes[tier];
        let scale = Math.pow(10, tier * 3);
        return (n / scale).toFixed(2) + suffix;
    }

    /* Points loop */
    setInterval(() => {
        points += rate;
        document.getElementById("points").textContent = format(points);
    }, 1000);

    /* Reset layers */
    function unlockPrestige() {
        if (points < 1000) return alert("Need 1K Points");
        points = 0;
        rate += 2;
        alert("Prestiged! +2/sec");
    }

    function unlockAscend() {
        if (rate < 10) return alert("Need 10/sec");
        rate += 10;
        alert("Ascended! +10/sec");
    }

    function unlockDivinity() {
        if (rate < 100) return alert("Need 100/sec");
        rate += 100;
        alert("Divinity unlocked! +100/sec");
    }
</script>

</body>
</html>
