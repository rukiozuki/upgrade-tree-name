<!DOCTYPE html>
<html>
<head>
<style>
    body {
        margin: 0;
        background: #111;
        font-family: Arial, sans-serif;
        color: white;
    }

    /* Currency UI */
    #pointsBox {
        position: fixed;
        bottom: 20px;
        left: 20px;
        width: 200px;
        padding: 14px;
        background: rgba(40, 40, 40, 0.9);
        border-radius: 14px;
        display: flex;
        flex-direction: column;
        gap: 4px;
    }

    #topRow {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    #icon {
        font-size: 32px;
        color: gold;
        font-weight: bold;
    }

    #points {
        font-size: 28px;
        font-weight: bold;
    }

    #rate {
        font-size: 16px;
        color: #bbb;
    }

    /* Honeycomb Tree */
    #tree {
        position: fixed;
        top: 50px;
        right: 50px;
        width: 500px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
    }

    .hex {
        width: 100px;
        height: 110px;
        background: #222;
        clip-path: polygon(
            50% 0%, 93% 25%, 93% 75%,
            50% 100%, 7% 75%, 7% 25%
        );
        display: flex;
        justify-content: center;
        align-items: center;
        border: 2px solid #444;
        cursor: pointer;
        transition: 0.2s;
        text-align: center;
        padding: 10px;
    }

    .hex:hover {
        border-color: gold;
        transform: scale(1.05);
    }

    .locked {
        opacity: 0.4;
        border-color: #333;
        cursor: default;
    }
</style>
</head>
<body>

<!-- Currency UI -->
<div id="pointsBox">
    <div id="topRow">
        <div id="icon">P</div>
        <div id="points">0</div>
    </div>
    <div id="rate">+1 / sec</div>
</div>

<!-- Honeycomb Upgrade Tree -->
<div id="tree"></div>

<script>
/* ===========================
   BIG NUMBER FORMATTER
=========================== */
function format(n) {
    const suffixes = ["", "K", "M", "B", "T", "Qa", "Qi", "Sx", "Sp", "Oc", "No", "Dc"];
    if (n < 1000) return n;
    let tier = Math.floor(Math.log10(n) / 3);
    let suffix = suffixes[tier];
    let scale = Math.pow(10, tier * 3);
    return (n / scale).toFixed(2) + suffix;
}

/* ===========================
   PLAYER STATS
=========================== */
let points = 0;
let rate = 1;

/* ===========================
   UPGRADE TREE DATA
=========================== */
let upgrades = [
    { id: 1, name: "Prestige", cost: 1000, unlocked: true, effect: () => { rate += 2; } },
    { id: 2, name: "Prestige Boost", cost: 5000, unlocked: false, effect: () => { rate += 5; } },
    { id: 3, name: "Ascend", cost: 100000, unlocked: false, effect: () => { rate += 20; } },
    { id: 4, name: "Ascend Boost", cost: 500000, unlocked: false, effect: () => { rate += 50; } },
    { id: 5, name: "Divinity", cost: 10000000, unlocked: false, effect: () => { rate += 200; } },
    { id: 6, name: "Divine Boost", cost: 50000000, unlocked: false, effect: () => { rate += 500; } }
];

/* ===========================
   RENDER HONEYCOMB TREE
=========================== */
function renderTree() {
    const tree = document.getElementById("tree");
    tree.innerHTML = "";

    upgrades.forEach(upg => {
        let hex = document.createElement("div");
        hex.className = "hex";
        if (!upg.unlocked) hex.classList.add("locked");

        hex.innerHTML = `${upg.name}<br><small>${format(upg.cost)}</small>`;

        hex.onclick = () => buyUpgrade(upg.id);

        tree.appendChild(hex);
    });
}

/* ===========================
   BUY UPGRADE
=========================== */
function buyUpgrade(id) {
    let upg = upgrades.find(u => u.id === id);
    if (!upg.unlocked) return;
    if (points < upg.cost) return;

    points -= upg.cost;
    upg.effect();

    // Unlock next upgrade
    let next = upgrades.find(u => u.id === id + 1);
    if (next) next.unlocked = true;

    renderTree();
}

/* ===========================
   POINTS LOOP
=========================== */
setInterval(() => {
    points += rate;
    document.getElementById("points").textContent = format(points);
    document.getElementById("rate").textContent = `+${format(rate)} / sec`;
}, 1000);

/* Start */
renderTree();
</script>

</body>
</html>
